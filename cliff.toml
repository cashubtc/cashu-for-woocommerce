[changelog]
header = "# Changelog\n\n"
body = """
{% if version -%}
## [{{ version }}]({% if previous.version %}https://github.com/robwoodgate/cashu-for-woocommerce/compare/{{ previous.version }}...{{ version }}{% else %}https://github.com/robwoodgate/cashu-for-woocommerce/releases/tag/{{ version }}{% endif %}){% if timestamp %} ({{ timestamp | date(format="%Y-%m-%d") }}){% endif %}
{%- else -%}
## Unreleased
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
{%- set subject = commit.message | split(pat="\n") | first | trim -%}
{%- set parts = subject | split(pat=" (#") -%}
{%- set pr_candidate = parts | last | replace(from=")", to="") -%}
{%- if parts | length == 2 and pr_candidate is matching("^[0-9]+$") -%}
- {{ parts | first }} ([#{{ pr_candidate }}](https://github.com/robwoodgate/cashu-for-woocommerce/pull/{{ pr_candidate }})) ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/robwoodgate/cashu-for-woocommerce/commit/{{ commit.id }}))
{% else -%}
- {{ subject }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/robwoodgate/cashu-for-woocommerce/commit/{{ commit.id }}))
{% endif -%}
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

[[git.commit_parsers]]
message = "^feat"
group = "Features"

[[git.commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[git.commit_parsers]]
message = "^perf"
group = "Performance"

[[git.commit_parsers]]
message = "^refactor"
group = "Refactoring"

# Non-user-facing types are skipped — the GitHub commit history is the
# audit trail for those. CHANGELOG.md is for features and fixes only,
# matching the cashu-ts convention.
[[git.commit_parsers]]
message = "^docs"
skip = true

[[git.commit_parsers]]
message = "^test"
skip = true

[[git.commit_parsers]]
message = "^build"
skip = true

[[git.commit_parsers]]
message = "^ci"
skip = true

[[git.commit_parsers]]
message = "^chore"
skip = true

[[git.commit_parsers]]
message = "^style"
skip = true

[[git.commit_parsers]]
message = "^i18n"
skip = true
