name: PR build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not moving tags) to guard against
      # an upstream tag being repointed at a malicious commit. Trailing
      # comments are the human-readable version that SHA corresponded to
      # at pin time. .github/dependabot.yml opens grouped weekly PRs to
      # bump them.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc  # v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install zip + gettext
        run: |
          sudo apt-get update
          sudo apt-get install -y zip gettext

      - name: Build via build.sh
        run: bash ./build.sh

      - name: Verify zip was produced
        run: test -f cashu-for-woocommerce.zip

      - name: Verify .mo generated when .po exists
        run: |
          set -euo pipefail
          if ls languages/*.po >/dev/null 2>&1; then
            for po in languages/*.po; do
              mo="${po%.po}.mo"
              test -f "$mo" || { echo "Missing $mo"; exit 1; }
            done
          fi

      - name: Run PHPUnit
        run: composer test
