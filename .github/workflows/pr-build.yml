name: PR build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not moving tags) to guard against
      # an upstream tag being repointed at a malicious commit. Trailing
      # comments are the human-readable version that SHA corresponded to
      # at pin time. .github/dependabot.yml opens grouped weekly PRs to
      # bump them.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: pcov

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build via build.sh
        run: bash ./build.sh

      - name: Verify zip was produced
        run: test -f cashu-for-woocommerce.zip

      - name: Run PHPUnit (with coverage)
        run: composer test:coverage

      - name: Run vitest (with coverage)
        run: npm run test:ts:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/php/clover.xml,coverage/ts/lcov.info
